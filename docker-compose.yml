# Runtime stack for playAIdes — single source of truth for `docker compose up`.
#
# Brings up backend (Python + incarnation_server), frontend (Vite dev), and
# whisper (STT). TTS now lives in the standalone `voicebox` service (../../voicebox,
# shared with anime_video_gen) — start it separately. Ollama is intentionally NOT
# in this file — it stays external on the host so a future llama.cpp swap doesn't
# touch the docker stack.
#
# See spec: docs/superpowers/specs/2026-04-27-docker-compose-consolidation-design.md

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
      ssh:
        - default     # forwards your ssh agent so pip can install the private `voicebox` git dep
    image: playaides-backend:latest
    container_name: playaides-backend
    ports:
      - "8765:8765"
    volumes:
      - .:/app:rw                 # bind-mount whole repo for hot-reload
    environment:
      # External LLM on the host (Ollama by default; any /v1 endpoint works).
      # extra_hosts below makes host.docker.internal resolve to the host
      # gateway on Linux. Override LLM_URL via .env to point at e.g.
      # llamacpp-wrapper at host.docker.internal:8081/v1.
      - LLM_URL=${LLM_URL:-http://host.docker.internal:11434/v1}
      - LLM_MODEL=${LLM_MODEL:-gemma3:4b}
      # voicebox (the unified Qwen3-TTS service) runs as its OWN compose project on
      # the host; reach it via host.docker.internal (extra_hosts below). Start it:
      #   docker compose -f ../../voicebox/docker-compose.yml --profile serve up -d voicebox
      - TTS_URL=${TTS_URL:-http://host.docker.internal:8008}
      # whisper (STT) is still a sibling service on the docker network.
      - WHISPER_URL=http://whisper:9000
      # Pass-through from host shell / .env file. Empty = disabled (with
      # a startup log warning per the HA-integration spec).
      - PLAYAIDES_API_KEY
      - HA_URL
      - HA_TOKEN
      - HA_DEFAULT_AGENT_ID
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      whisper:
        condition: service_healthy
    # CMD is set in Dockerfile.backend; uncomment to override for one-off runs:
    # command: ["python", "main.py", "--use_avatar"]

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    image: playaides-frontend:latest
    container_name: playaides-frontend
    ports:
      - "5173:5173"
    volumes:
      - ./incarnation:/app/incarnation:rw
      - frontend_node_modules:/app/incarnation/node_modules
    # CMD is set in Dockerfile.frontend.

  # The embedded `tts` service (Qwen3 streaming TTS) was REMOVED — superseded by the
  # standalone `voicebox` service (../../voicebox), now shared with anime_video_gen.
  # Start voicebox separately (it owns the GPU + model weights):
  #   docker compose -f ../../voicebox/docker-compose.yml --profile serve up -d voicebox
  # The backend reaches it at host.docker.internal:8008 (TTS_URL above).

  whisper:
    image: onerahmet/openai-whisper-asr-webservice:latest
    container_name: playaides-whisper
    environment:
      - ASR_MODEL=base
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/"]
      interval: 10s
      retries: 5
      start_period: 60s
    # No host port — only reachable from `backend` over the docker network.

volumes:
  frontend_node_modules:
