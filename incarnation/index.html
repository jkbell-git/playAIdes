<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Incarnation — PlayAIdes</title>
    <link rel="stylesheet" href="/styles/viewer.css" />
  </head>
  <body>
    <!-- Decorative top strip (always visible regardless of cinematic mode) -->
    <div class="viewer-strip"></div>

    <!-- 3D canvas (full-page, behind everything) -->
    <canvas id="viewer"></canvas>

    <!-- Phase 4: red-diagonal wipe shown during persona swap (200 ms). -->
    <div id="wipe-overlay" class="wipe-overlay"></div>

    <!-- Camera split layout (manga theme): Silver's canvas shrinks to the left,
         the live feed fills the right, an organic ink divider sits on the seam.
         Toggled by body[data-layout="split-camera"] (see stageLayout.js). -->
    <div id="stage-split" class="stage-split" aria-hidden="true">
      <div id="split-feed" class="split-feed">
        <img id="split-feed-image" class="split-feed-image" alt="" />
      </div>
      <svg id="split-divider" class="split-divider" viewBox="0 0 60 300"
           preserveAspectRatio="none" aria-hidden="true">
        <path d="M26,0 C18,38 36,72 24,108 C14,144 32,186 22,224 C16,258 30,286 24,300
                 L40,300 C46,262 30,222 42,184 C52,146 34,106 44,70 C50,40 34,14 36,0 Z" />
      </svg>
    </div>

    <!-- Overlays. Each is hidden by viewerOverlays.js when its config flag
         (or the master cinematic flag) is off. -->
    <div id="mic-indicator" class="mic-indicator state-empty"></div>

    <div id="subtitle-band" class="subtitle-band">
      <span id="subtitle-text"></span>
    </div>

    <div id="nameplate" class="nameplate">
      <span id="nameplate-conn" class="nameplate-conn"></span>
      <span id="nameplate-name" class="nameplate-name">—</span>
    </div>

    <!-- Picture-in-picture panel (spec §3.10). Hidden until a show_pip WS
         message; command-driven, so no config-flag gate. -->
    <div id="pip-overlay" class="pip-overlay">
      <img id="pip-image" class="pip-image" alt="" />
    </div>

    <!-- Phase 5: collapsible chat panel — right-edge handle + 440px slide-in -->
    <div id="chat-panel" class="chat-panel" aria-hidden="true">
      <button id="chat-panel-handle" class="chat-panel-handle"
              type="button" aria-label="Open chat panel">‹</button>
      <div class="chat-panel-body">
        <header class="chat-panel-header">
          <span id="chat-panel-name" class="chat-panel-name">—</span>
          <span id="chat-panel-wake" class="chat-panel-wake"></span>
        </header>
        <div id="chat-panel-transcript" class="chat-panel-transcript" aria-live="polite"></div>
        <form id="chat-panel-input-row" class="chat-panel-input-row">
          <input id="chat-panel-input" class="chat-panel-input"
                 type="text" autocomplete="off"
                 placeholder="type to speak…" />
          <button id="chat-panel-send" class="chat-panel-send"
                  type="submit" aria-label="Send">▶</button>
        </form>
      </div>
    </div>

    <!-- Unified bottom console: persistent reply (subtitle) + text input,
         visible even in kiosk (the side chat panel + subtitle band are hidden
         there). Type to speak; Silver's reply shows in the line above. -->
    <div id="console-bar" class="console-bar">
      <div id="console-log" class="console-log faded" aria-live="polite"></div>
      <form id="console-input-row" class="console-input-row">
        <input id="console-input" class="console-input" type="text"
               autocomplete="off" placeholder="type to speak…" />
        <button id="console-send" class="console-send" type="submit" aria-label="Send">▶</button>
      </form>
    </div>

    <script type="module" src="/src/viewer.js"></script>
  </body>
</html>
