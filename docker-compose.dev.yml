# Local-development services exposed on host ports.
#
# Use when you're running `python main.py` on the host and need backing
# services (Whisper STT, etc.) reachable at localhost. Distinct from
# docker-compose.live.yml which is the test-stack overlay (no host ports).
#
# Run individually:
#   docker compose -f docker-compose.dev.yml up -d whisper
#
# Or via the Makefile shortcut:
#   make whisper

services:
  whisper:
    image: onerahmet/openai-whisper-asr-webservice:latest
    container_name: playaides-whisper-dev
    ports:
      - "9000:9000"
    environment:
      # Multilingual base model — supports both English and Japanese.
      # Do NOT switch to *.en — we lose Japanese.
      - ASR_MODEL=base
      - ASR_ENGINE=faster_whisper
    restart: unless-stopped
